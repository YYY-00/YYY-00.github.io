<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Activity Booking System - Book tickets for concerts, sports, theater and more">
    <title>Activity Booking System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/calendar.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="main-header">
            <div class="header-content">
                <h1 class="logo">🎫 EventHub</h1>
                <nav class="main-nav">
                    <button class="nav-btn active" data-view="calendar">Calendar</button>
                    <button class="nav-btn" data-view="events">Events</button>
                    <button class="nav-btn" data-view="admin">Admin Dashboard</button>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Filters Section -->
            <section class="filters-section">
                <div class="filter-group">
                    <label for="date-filter">Date Range:</label>
                    <input type="date" id="date-filter-start" class="date-input">
                    <span>to</span>
                    <input type="date" id="date-filter-end" class="date-input">
                </div>

                <div class="filter-group">
                    <label for="venue-filter">Venue:</label>
                    <select id="venue-filter" class="filter-select">
                        <option value="">All Venues</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Category:</label>
                    <div class="checkbox-group" id="category-filters">
                        <label class="checkbox-label">
                            <input type="checkbox" value="concert" checked> Concerts
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="sports" checked> Sports
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="theater" checked> Theater
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="comedy" checked> Comedy
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="conference" checked> Conferences
                        </label>
                    </div>
                </div>

                <button class="btn btn-secondary" id="reset-filters">Reset Filters</button>
            </section>

            <!-- Views Container -->
            <div class="views-container">
                <!-- Calendar View -->
                <section id="calendar-view" class="view active">
                    <div class="calendar-header">
                        <button class="btn btn-secondary" id="prev-month">← Previous</button>
                        <h2 id="current-month">March 2026</h2>
                        <button class="btn btn-secondary" id="next-month">Next →</button>
                    </div>
                    <div class="calendar-grid" id="calendar">
                        <div class="calendar-day-header">Sun</div>
                        <div class="calendar-day-header">Mon</div>
                        <div class="calendar-day-header">Tue</div>
                        <div class="calendar-day-header">Wed</div>
                        <div class="calendar-day-header">Thu</div>
                        <div class="calendar-day-header">Fri</div>
                        <div class="calendar-day-header">Sat</div>
                        <!-- Calendar days will be generated by JS -->
                    </div>
                </section>

                <!-- Events List View -->
                <section id="events-view" class="view">
                    <div class="events-header">
                        <h2>Upcoming Events</h2>
                        <span id="events-count" class="events-count">20 events</span>
                    </div>
                    <div id="events-list" class="events-list">
                        <!-- Events will be generated by JS -->
                    </div>
                </section>

                <!-- Admin Dashboard View -->
                <section id="admin-view" class="view">
                    <h2>Admin Dashboard</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Total Bookings</div>
                            <div class="stat-value" id="total-bookings">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total Revenue</div>
                            <div class="stat-value" id="total-revenue">$0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Avg. Occupancy</div>
                            <div class="stat-value" id="avg-occupancy">0%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Active Events</div>
                            <div class="stat-value" id="active-events">0</div>
                        </div>
                    </div>

                    <div class="admin-section">
                        <h3>Revenue by Event</h3>
                        <div id="revenue-chart" class="bar-chart">
                            <!-- Chart bars will be generated by JS -->
                        </div>
                    </div>

                    <div class="admin-section">
                        <h3>Popular Venues</h3>
                        <div id="venues-chart" class="bar-chart">
                            <!-- Chart bars will be generated by JS -->
                        </div>
                    </div>

                    <div class="admin-section">
                        <h3>Category Distribution</h3>
                        <div id="category-chart" class="bar-chart">
                            <!-- Chart bars will be generated by JS -->
                        </div>
                    </div>
                </section>
            </div>

            <!-- Event Details Modal -->
            <div id="event-modal" class="modal">
                <div class="modal-content">
                    <button class="modal-close" id="modal-close">&times;</button>
                    <div id="event-details">
                        <!-- Event details will be populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Booking Confirmation Modal -->
            <div id="booking-modal" class="modal">
                <div class="modal-content booking-modal">
                    <button class="modal-close" id="booking-modal-close">&times;</button>
                    <div id="booking-confirmation">
                        <!-- Booking confirmation will be populated by JS -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <p>&copy; 2026 EventHub - Activity Booking System Prototype</p>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
