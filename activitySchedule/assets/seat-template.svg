<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Seat Template - Basic seat circle for reference -->
  <circle cx="50" cy="50" r="35" fill="#10b981" stroke="#059669" stroke-width="2" />

  <!-- Available seat color example -->
  <circle cx="50" cy="50" r="35" fill="#10b981" stroke="#059669" stroke-width="2" opacity="0.3" />

  <!-- Text label example -->
  <text x="50" y="55" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">A1</text>
</svg>

<!--
Seat states:
- Available: fill="#10b981" (green)
- Selected: fill="#6366f1" (blue)
- Sold: fill="#ef4444" (red)

This template is for reference only.
The actual seat maps are generated dynamically in seatmap.js
-->
