<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Event Booking System</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">

  <!-- QR Code Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        EventBooker
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="events.html">Browse All</a>
        <a href="admin.html" class="active">Admin</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" style="padding-top: var(--spacing-xl);">
    <div class="container">
      <div class="admin-layout">
        <!-- Sidebar Navigation -->
        <aside class="admin-sidebar" id="admin-nav"></aside>

        <!-- Main Content Area -->
        <div class="admin-main" id="admin-content">
          <div class="loading">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" style="margin-top: var(--spacing-2xl);">
    <div class="container">
      <div style="text-align: center; color: var(--gray-400);">
        &copy; 2026 EventBooker. All rights reserved.
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/timezone.js"></script>
  <script src="js/admin.js"></script>

  <style>
    .main-content {
      min-height: calc(100vh - 200px);
    }

    .admin-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: var(--spacing-xl);
      align-items: start;
    }

    .admin-sidebar {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      padding: var(--spacing-md) 0;
      position: sticky;
      top: 80px;
    }

    .admin-nav {
      display: flex;
      flex-direction: column;
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-lg);
      color: var(--gray-600);
      text-decoration: none;
      transition: all 0.2s;
    }

    .admin-nav-item:hover {
      background: var(--gray-50);
      color: var(--primary);
    }

    .admin-nav-item.active {
      background: #e0e7ff;
      color: var(--primary);
      font-weight: 600;
    }

    .nav-icon {
      font-size: 1.25rem;
    }

    .nav-label {
      flex: 1;
    }

    .admin-main {
      min-height: 600px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-xl);
    }

    .admin-header h1 {
      font-size: 2rem;
      margin: 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }

    .stat-card {
      background: white;
      padding: var(--spacing-lg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      display: flex;
      gap: var(--spacing-md);
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .charts-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: var(--spacing-xl);
      margin-bottom: var(--spacing-xl);
    }

    .chart-container {
      background: white;
      padding: var(--spacing-lg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .chart-container h3 {
      margin-bottom: var(--spacing-md);
      font-size: 1.125rem;
    }

    .pie-chart-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .pie-chart {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      position: relative;
    }

    .pie-legend {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: 0.875rem;
    }

    .pie-legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .pie-legend-label {
      flex: 1;
      color: var(--gray-700);
    }

    .pie-legend-value {
      font-weight: 600;
      color: var(--gray-900);
    }

    .pie-legend-revenue {
      color: var(--gray-500);
      font-size: 0.875rem;
    }

    .admin-table-container {
      background: white;
      padding: var(--spacing-lg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .admin-table-container h2 {
      margin-bottom: var(--spacing-md);
      font-size: 1.25rem;
    }

    .table-responsive {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }

    .admin-table th,
    .admin-table td {
      padding: var(--spacing-sm) var(--spacing-md);
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
    }

    .admin-table th {
      background: var(--gray-50);
      font-weight: 600;
      color: var(--gray-700);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    .admin-table tr:hover {
      background: var(--gray-50);
    }

    .occupancy-bar {
      width: 80px;
      height: 8px;
      background: var(--gray-200);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-right: var(--spacing-sm);
    }

    .occupancy-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #059669);
      border-radius: var(--radius-full);
      transition: width 0.3s ease;
    }

    @media (max-width: 1024px) {
      .admin-layout {
        grid-template-columns: 1fr;
      }

      .admin-sidebar {
        position: relative;
        top: 0;
      }

      .charts-section {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
        gap: var(--spacing-md);
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .admin-nav {
        flex-direction: row;
        overflow-x: auto;
      }

      .admin-nav-item {
        flex-shrink: 0;
      }
    }
  </style>
</body>
</html>
