<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>AI 对话助手</h2>
            </div>

            <div class="new-chat-btn" id="newChatBtn">
                <span class="icon">+</span>
                新建对话
            </div>

            <div class="chat-history" id="chatHistory">
                <!-- 对话历史列表 -->
            </div>

            <div class="settings-btn" id="settingsBtn">
                <span class="icon">⚙️</span>
                设置
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="chat-container">
                <!-- 消息列表 -->
                <div class="messages" id="messages">
                    <div class="welcome-message">
                        <h1>欢迎使用 AI 对话助手</h1>
                        <p>请先在设置中配置 API Key，然后开始对话</p>
                    </div>
                </div>

                <!-- 输入区域 -->
                <div class="input-area">
                    <textarea
                        id="userInput"
                        placeholder="输入你的问题..."
                        rows="1"
                    ></textarea>
                    <button id="sendBtn" class="send-btn" disabled>
                        <span class="icon">↑</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="close-btn" id="closeSettings">×</button>
            </div>

            <div class="modal-body">
                <div class="setting-group">
                    <label>API 提供商</label>
                    <select id="apiProvider">
                        <option value="claude">Claude (Anthropic)</option>
                        <option value="openai">OpenAI (GPT)</option>
                        <option value="ollama">Ollama (本地模型)</option>
                        <option value="custom">自定义 API</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="输入你的 API Key">
                    <small>你的 API Key 将只保存在本地浏览器中</small>
                </div>

                <div class="setting-group" id="apiUrlGroup" style="display: none;">
                    <label for="apiUrl">API URL</label>
                    <input type="text" id="apiUrl" placeholder="https://api.example.com/v1/chat">
                </div>

                <div class="setting-group">
                    <label for="model">模型</label>
                    <input type="text" id="model" placeholder="claude-3-5-sonnet-20241022" value="claude-3-5-sonnet-20241022">
                </div>

                <div class="setting-group">
                    <label for="systemPrompt">系统提示词</label>
                    <textarea id="systemPrompt" rows="3" placeholder="你是一个有用的AI助手...">你是一个有用的AI助手，始终以友好和专业的方式回答问题。</textarea>
                </div>

                <div class="setting-group">
                    <label for="temperature">温度 (0-1)</label>
                    <input type="number" id="temperature" min="0" max="1" step="0.1" value="0.7">
                </div>

                <div class="setting-group">
                    <label for="maxTokens">最大 Tokens</label>
                    <input type="number" id="maxTokens" min="1" max="200000" value="4096">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelSettings">取消</button>
                <button class="btn btn-primary" id="saveSettings">保存</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
