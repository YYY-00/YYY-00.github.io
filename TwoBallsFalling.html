<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理实验演示 - 两个物体同时下落</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 控制面板样式 */
        .control-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .control-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .control-group select,
        .control-group input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .control-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .control-group input[type="range"] {
            -webkit-appearance: none;
            height: 8px;
            background: #e0e0e0;
            border: none;
            padding: 0;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        .value-display {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 14px;
            color: #666;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .object-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .object-card {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .object-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .object-card.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .object-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }

        /* 实验显示区样式 */
        .experiment-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .experiment-area h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #667eea;
        }

        #experimentCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to bottom, #8B4513 0%, #654321 100%);
            border-top: 4px solid #228B22;
        }

        /* 底部控制区样式 */
        .bottom-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            align-items: center;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #resetBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        #resetBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .results-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .result-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .result-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .result-card .unit {
            font-size: 14px;
            color: #999;
            margin-left: 5px;
        }

        .color-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .info-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.6;
        }

        .info-box strong {
            color: #856404;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .bottom-panel {
                grid-template-columns: 1fr;
            }

            .button-group {
                justify-content: center;
            }

            header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 物理实验演示</h1>
            <p>探索重力、空气阻力与物体运动的奥秘</p>
        </header>

        <div class="main-content">
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <h2>⚙️ 实验参数</h2>

                <!-- 物体1选择 -->
                <div class="control-group">
                    <label>物体1</label>
                    <div class="object-selector">
                        <div class="object-card selected" data-object="ball" data-objnum="1">
                            <div class="object-icon">⚽</div>
                            <div>小球</div>
                        </div>
                        <div class="object-card" data-object="feather" data-objnum="1">
                            <div class="object-icon">🪶</div>
                            <div>羽毛</div>
                        </div>
                    </div>
                </div>

                <!-- 物体2选择 -->
                <div class="control-group">
                    <label>物体2</label>
                    <div class="object-selector">
                        <div class="object-card selected" data-object="ball" data-objnum="2">
                            <div class="object-icon">⚽</div>
                            <div>小球</div>
                        </div>
                        <div class="object-card" data-object="feather" data-objnum="2">
                            <div class="object-icon">🪶</div>
                            <div>羽毛</div>
                        </div>
                    </div>
                </div>

                <!-- 是否真空 -->
                <div class="control-group checkbox-group">
                    <input type="checkbox" id="vacuum">
                    <label for="vacuum">真空环境（无空气阻力）</label>
                </div>

                <!-- 风阻系数 -->
                <div class="control-group">
                    <label>风阻系数</label>
                    <input type="range" id="dragCoef" min="0" max="2" step="0.1" value="0.47">
                    <div class="value-display">
                        <span>0</span>
                        <span id="dragCoefValue">0.47</span>
                        <span>2</span>
                    </div>
                </div>

                <!-- 重力加速度 -->
                <div class="control-group">
                    <label>重力加速度 (m/s²)</label>
                    <input type="range" id="gravity" min="1" max="20" step="0.1" value="9.8">
                    <div class="value-display">
                        <span>1</span>
                        <span id="gravityValue">9.8 m/s²</span>
                        <span>20</span>
                    </div>
                </div>

                <!-- 物体重量 -->
                <div class="control-group">
                    <label>物体重量 (kg)</label>
                    <input type="range" id="mass" min="0.1" max="10" step="0.1" value="1">
                    <div class="value-display">
                        <span>0.1</span>
                        <span id="massValue">1.0 kg</span>
                        <span>10</span>
                    </div>
                </div>

                <div class="info-box">
                    <strong>💡 科学小知识：</strong><br>
                    在真空环境中，所有物体无论重量和形状如何，下落的加速度都相同。这是伽利略发现的著名物理定律！
                </div>
            </div>

            <!-- 右侧实验显示区 -->
            <div class="experiment-area">
                <h2>📊 实验演示</h2>
                <div class="canvas-container">
                    <canvas id="experimentCanvas"></canvas>
                    <div class="ground"></div>
                </div>
            </div>
        </div>

        <!-- 底部控制面板 -->
        <div class="bottom-panel">
            <div class="button-group">
                <button id="startBtn">▶ 开始实验</button>
                <button id="resetBtn">↺ 重置</button>
            </div>

            <div class="results-panel">
                <div class="result-card" style="border-left-color: #ff6b6b;">
                    <h3><span class="color-indicator" style="background: #ff6b6b;"></span>物体1 落地时间</h3>
                    <div class="value" id="time1">--<span class="unit">s</span></div>
                </div>
                <div class="result-card" style="border-left-color: #4ecdc4;">
                    <h3><span class="color-indicator" style="background: #4ecdc4;"></span>物体2 落地时间</h3>
                    <div class="value" id="time2">--<span class="unit">s</span></div>
                </div>
                <div class="result-card" style="border-left-color: #95e1d3;">
                    <h3><span class="color-indicator" style="background: #95e1d3;"></span>物体1 最终速度</h3>
                    <div class="value" id="velocity1">--<span class="unit">m/s</span></div>
                </div>
                <div class="result-card" style="border-left-color: #f38181;">
                    <h3><span class="color-indicator" style="background: #f38181;"></span>物体2 最终速度</h3>
                    <div class="value" id="velocity2">--<span class="unit">m/s</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const canvas = document.getElementById('experimentCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 控制参数
        const vacuumCheckbox = document.getElementById('vacuum');
        const dragCoefSlider = document.getElementById('dragCoef');
        const gravitySlider = document.getElementById('gravity');
        const massSlider = document.getElementById('mass');

        // 值显示
        const dragCoefValue = document.getElementById('dragCoefValue');
        const gravityValue = document.getElementById('gravityValue');
        const massValue = document.getElementById('massValue');

        // 结果显示
        const time1Display = document.getElementById('time1');
        const time2Display = document.getElementById('time2');
        const velocity1Display = document.getElementById('velocity1');
        const velocity2Display = document.getElementById('velocity2');

        // 物体选择卡片
        const objectCards = document.querySelectorAll('.object-card');

        // 设置canvas尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
        }

        // 物理模拟参数
        let isRunning = false;
        let animationId = null;
        let groundLevel = 40;

        // 物体类
        class PhysicsObject {
            constructor(x, y, type, color, name) {
                this.initialY = y;
                this.x = x;
                this.y = y;
                this.velocity = 0;
                this.type = type;
                this.color = color;
                this.name = name;
                this.finished = false;
                this.finishTime = null;
                this.finishVelocity = null;

                // 物理属性
                if (type === 'ball') {
                    this.radius = 25;
                    this.area = Math.PI * 0.025 * 0.025; // m²
                } else {
                    this.radius = 30;
                    this.area = 0.01; // m² (羽毛的投影面积)
                }
            }

            update(dt, gravity, mass, dragCoef, isVacuum) {
                if (this.finished) return;

                // 计算力
                const gravitationalForce = mass * gravity;

                let dragForce = 0;
                if (!isVacuum) {
                    // 空气阻力公式: F = 0.5 * ρ * v² * Cd * A
                    // 简化: F = dragCoef * v²
                    const airDensity = 1.225; // kg/m³ (海平面)
                    dragForce = 0.5 * airDensity * this.velocity * this.velocity * dragCoef * this.area;

                    // 羽毛受到更大的阻力
                    if (this.type === 'feather') {
                        dragForce *= 3; // 羽毛阻力系数更大
                    }
                }

                const netForce = gravitationalForce - dragForce;
                const acceleration = netForce / mass;

                // 更新速度和位置
                this.velocity += acceleration * dt;
                this.y += this.velocity * dt * 50; // 缩放因子适配canvas

                // 检查是否到达地面
                if (this.y >= canvas.height - groundLevel - this.radius) {
                    this.y = canvas.height - groundLevel - this.radius;
                    this.finished = true;
                    this.finishVelocity = this.velocity;
                }
            }

            draw() {
                ctx.save();

                if (this.type === 'ball') {
                    // 绘制小球
                    const gradient = ctx.createRadialGradient(
                        this.x - this.radius * 0.3,
                        this.y - this.radius * 0.3,
                        0,
                        this.x,
                        this.y,
                        this.radius
                    );
                    gradient.addColorStop(0, '#ff9999');
                    gradient.addColorStop(0.5, this.color);
                    gradient.addColorStop(1, '#cc0000');

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    // 高光效果
                    ctx.beginPath();
                    ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.fill();

                } else {
                    // 绘制羽毛
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.velocity * 0.02); // 羽毛会旋转

                    // 羽毛主体
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius * 0.4, this.radius, 0, 0, Math.PI * 2);
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.7, this.color);
                    gradient.addColorStop(1, '#cccccc');
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.strokeStyle = '#999999';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // 羽毛轴
                    ctx.beginPath();
                    ctx.moveTo(0, -this.radius);
                    ctx.lineTo(0, this.radius);
                    ctx.strokeStyle = '#888888';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.restore();
                    ctx.save();
                }

                ctx.restore();
            }

            reset() {
                this.y = this.initialY;
                this.velocity = 0;
                this.finished = false;
                this.finishTime = null;
                this.finishVelocity = null;
            }
        }

        // 创建两个物体
        let object1, object2;

        function initObjects() {
            const obj1Type = document.querySelector('.object-card[data-objnum="1"].selected').dataset.object;
            const obj2Type = document.querySelector('.object-card[data-objnum="2"].selected').dataset.object;

            const startX1 = canvas.width * 0.3;
            const startX2 = canvas.width * 0.7;
            const startY = 50;

            object1 = new PhysicsObject(startX1, startY, obj1Type, '#ff6b6b', '物体1');
            object2 = new PhysicsObject(startX2, startY, obj2Type, '#4ecdc4', '物体2');
        }

        // 绘制场景
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;

            // 垂直线
            const spacing = 50;
            for (let x = object1.x; x >= 0; x -= spacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let x = object1.x; x < canvas.width; x += spacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // 水平线
            for (let y = startY; y < canvas.height - groundLevel; y += spacing) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // 绘制刻度
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.font = '12px Arial';
            for (let y = startY; y < canvas.height - groundLevel; y += spacing) {
                const meters = ((y - startY) / 50).toFixed(1);
                ctx.fillText(meters + 'm', 10, y + 4);
            }

            // 绘制物体
            if (object1) object1.draw();
            if (object2) object2.draw();

            // 绘制地面
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - groundLevel, canvas.width, groundLevel);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - groundLevel, canvas.width, 4);
        }

        // 动画循环
        let lastTime = 0;
        let elapsedTime = 0;

        function animate(currentTime) {
            if (!lastTime) lastTime = currentTime;
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            if (isRunning) {
                elapsedTime += dt;

                const gravity = parseFloat(gravitySlider.value);
                const mass = parseFloat(massSlider.value);
                const dragCoef = parseFloat(dragCoefSlider.value);
                const isVacuum = vacuumCheckbox.checked;

                // 更新物体
                if (!object1.finished) {
                    object1.update(dt, gravity, mass, dragCoef, isVacuum);
                    if (object1.finished && object1.finishTime === null) {
                        object1.finishTime = elapsedTime;
                    }
                }

                if (!object2.finished) {
                    object2.update(dt, gravity, mass, dragCoef, isVacuum);
                    if (object2.finished && object2.finishTime === null) {
                        object2.finishTime = elapsedTime;
                    }
                }

                // 更新结果显示
                updateResults();

                // 检查是否都完成
                if (object1.finished && object2.finished) {
                    isRunning = false;
                    startBtn.disabled = false;
                }
            }

            draw();

            if (isRunning) {
                animationId = requestAnimationFrame(animate);
            }
        }

        // 更新结果显示
        function updateResults() {
            if (object1.finishTime !== null) {
                time1Display.innerHTML = object1.finishTime.toFixed(3) + '<span class="unit">s</span>';
                velocity1Display.innerHTML = object1.finishVelocity.toFixed(2) + '<span class="unit">m/s</span>';
            }

            if (object2.finishTime !== null) {
                time2Display.innerHTML = object2.finishTime.toFixed(3) + '<span class="unit">s</span>';
                velocity2Display.innerHTML = object2.finishVelocity.toFixed(2) + '<span class="unit">m/s</span>';
            }
        }

        // 开始实验
        function startExperiment() {
            if (isRunning) return;

            initObjects();
            isRunning = true;
            lastTime = 0;
            elapsedTime = 0;
            startBtn.disabled = true;

            // 重置结果显示
            time1Display.innerHTML = '--<span class="unit">s</span>';
            time2Display.innerHTML = '--<span class="unit">s</span>';
            velocity1Display.innerHTML = '--<span class="unit">m/s</span>';
            velocity2Display.innerHTML = '--<span class="unit">m/s</span>';

            animationId = requestAnimationFrame(animate);
        }

        // 重置实验
        function resetExperiment() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            lastTime = 0;
            elapsedTime = 0;

            initObjects();

            // 重置结果显示
            time1Display.innerHTML = '--<span class="unit">s</span>';
            time2Display.innerHTML = '--<span class="unit">s</span>';
            velocity1Display.innerHTML = '--<span class="unit">m/s</span>';
            velocity2Display.innerHTML = '--<span class="unit">m/s</span>';

            startBtn.disabled = false;
            draw();
        }

        // 事件监听
        startBtn.addEventListener('click', startExperiment);
        resetBtn.addEventListener('click', resetExperiment);

        // 滑块事件
        dragCoefSlider.addEventListener('input', (e) => {
            dragCoefValue.textContent = e.target.value;
        });

        gravitySlider.addEventListener('input', (e) => {
            gravityValue.textContent = e.target.value + ' m/s²';
        });

        massSlider.addEventListener('input', (e) => {
            massValue.textContent = parseFloat(e.target.value).toFixed(1) + ' kg';
        });

        // 物体选择事件
        objectCards.forEach(card => {
            card.addEventListener('click', () => {
                const objNum = card.dataset.objnum;
                document.querySelectorAll(`.object-card[data-objnum="${objNum}"]`).forEach(c => {
                    c.classList.remove('selected');
                });
                card.classList.add('selected');
                resetExperiment();
            });
        });

        // 真空复选框事件
        vacuumCheckbox.addEventListener('change', () => {
            if (vacuumCheckbox.checked) {
                dragCoefSlider.disabled = true;
                dragCoefSlider.parentElement.style.opacity = '0.5';
            } else {
                dragCoefSlider.disabled = false;
                dragCoefSlider.parentElement.style.opacity = '1';
            }
        });

        // 初始化
        window.addEventListener('resize', () => {
            resizeCanvas();
            initObjects();
        });

        resizeCanvas();
        initObjects();
        draw();
    </script>
</body>
</html>
